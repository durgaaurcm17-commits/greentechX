<!DOCTYPE html>
<html>

<head>
    <title>Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#121414] flex items-center justify-center min-h-screen text-white">

    <div class="bg-[#1B1F1F] p-8 rounded-xl w-96 shadow-lg">

        <h2 class="text-2xl font-bold mb-6 text-center">Admin Login</h2>

        {% if error %}
        <p class="text-red-400 text-sm mb-4">{{ error }}</p>
        {% endif %}

        <form method="POST">

            <input type="text" name="admin_id" placeholder="Admin ID"
                class="w-full p-3 mb-4 rounded bg-gray-800 border border-gray-700">

            <input type="password" name="password" placeholder="Password"
                class="w-full p-3 mb-6 rounded bg-gray-800 border border-gray-700">

            <button type="submit" class="w-full bg-teal-600 hover:bg-teal-700 p-3 rounded font-semibold">
                Login
            </button>

        </form>

        <a href="/" class="block text-center text-sm mt-4 text-gray-400">← Back to Home</a>

    </div>

</body>

</html>
