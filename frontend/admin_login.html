<!DOCTYPE html>
<html>

<head>
    <title>Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#121414] flex items-center justify-center min-h-screen text-white">

    <div class="bg-[#1B1F1F] p-8 rounded-xl w-96 shadow-lg">

        <h2 class="text-2xl font-bold mb-6 text-center">Admin Login</h2>

        <!-- Error messages here -->

        <div id="errorMessage" class="text-red-400 text-sm mb-4 hidden"></div>

        <form id="loginForm">

            <input type="text" id="admin_id" placeholder="Admin ID"
                class="w-full p-3 mb-4 rounded bg-gray-800 border border-gray-700">

            <input type="password" id="password" placeholder="Password"
                class="w-full p-3 mb-6 rounded bg-gray-800 border border-gray-700">

            <button type="submit" class="w-full bg-teal-600 hover:bg-teal-700 p-3 rounded font-semibold">
                Login
            </button>

        </form>

        <script>
            const API_BASE = ""; // Relative to host

            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const admin_id = document.getElementById('admin_id').value;
                const password = document.getElementById('password').value;
                const errorDiv = document.getElementById('errorMessage');

                try {
                    const res = await fetch(`${API_BASE}/api/admin-login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ admin_id, password })
                    });
                    const data = await res.json();

                    if (data.success) {
                        window.location.href = data.redirect;
                    } else {
                        errorDiv.innerText = data.error;
                        errorDiv.classList.remove('hidden');
                    }
                } catch (err) {
                    errorDiv.innerText = "Error connecting to server";
                    errorDiv.classList.remove('hidden');
                }
            });
        </script>

        <a href="home.html" class="block text-center text-sm mt-4 text-gray-400">← Back to Home</a>

    </div>

</body>

</html>
