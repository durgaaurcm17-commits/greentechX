<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Smart Waste System</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

    <!-- TomTom SDK -->
    <link rel='stylesheet' type='text/css' href='https://api.tomtom.com/maps-sdk-for-web/cdn/6.x/6.22.0/maps/maps.css'>
    <script src="https://api.tomtom.com/maps-sdk-for-web/cdn/6.x/6.22.0/maps/maps-web.min.js"></script>
    <script src="https://api.tomtom.com/maps-sdk-for-web/cdn/6.x/6.22.0/services/services-web.min.js"></script>
</head>

<body class="admin-page">
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo">
                <h2>WasteAdmin</h2>
            </div>
            <nav>
                <div class="nav-item active">Operational Overview</div>
                <div class="nav-item">Citizen Reports</div>
                <a href="/" class="nav-item"
                    style="display: block; text-decoration: none; margin-top: 20px; color: #94a3b8;">Home / Logout</a>
            </nav>
        </aside>

        <main class="content">
            <header class="top-bar">
                <h1>Admin Command Center</h1>
                <div class="user-info">Manager: #Admin1</div>
            </header>

            <!-- Stats Bar -->
            <div class="stats-bar"
                style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px;">
                <div class="card stat-item">
                    <span style="color: #94a3b8; font-size: 14px;">Total Managed Bins</span>
                    <h2 id="stat-total-bins" style="margin: 5px 0; color: #38bdf8;">0</h2>
                </div>
                <div class="card stat-item">
                    <span style="color: #94a3b8; font-size: 14px;">Avg. Fill Level</span>
                    <h2 id="stat-avg-fill" style="margin: 5px 0; color: #f59e0b;">0%</h2>
                </div>
                <div class="card stat-item">
                    <span style="color: #94a3b8; font-size: 14px;">Pending Issues</span>
                    <h2 id="stat-pending-issues" style="margin: 5px 0; color: #ef4444;">0</h2>
                </div>
            </div>

            <!-- Status Overview Section -->
            <div class="grid" style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; margin-bottom: 20px;">
                <div class="card map-card">
                    <h3>Live System Map</h3>
                    <div id="map" style="height: 450px; width: 100%; border-radius: 12px; border: 1px solid #334155;">
                    </div>
                </div>

                <div class="card bins-card">
                    <h3>Critical Bins</h3>
                    <div id="bin-list" style="max-height: 450px; overflow-y: auto;">
                        <p>Loading bins...</p>
                    </div>
                </div>
            </div>

            <h2>Citizen Problem Reports</h2>
            <div class="reports-grid" id="reports-container">
                <!-- Reports will be injected here -->
                <p>Loading reports...</p>
            </div>
        </main>
    </div>
    <div id="imageModal" class="image-modal" onclick="closeImageModal()">
        <span class="close-btn">&times;</span>
        <img id="modalImage" class="modal-content">
    </div>
    <script src="/js/admin.js"></script>
</body>

</html>
